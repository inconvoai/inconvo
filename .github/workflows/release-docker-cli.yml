name: Release Docker CLI

on:
  # push:
  #   tags:
  #     - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0 or 0.1.0-rc.1)"
        required: true
        default: "0.1.0"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: inconvoai/inconvo

# Top-level permissions for all jobs (can be overridden per-job)
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
      docker_channel_tag: ${{ steps.version.outputs.docker_channel_tag }}
      prisma_version: ${{ steps.catalog.outputs.prisma }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set and validate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ inputs.version }}"
          else
            RAW_VERSION="${{ github.ref_name }}"
          fi

          RAW_VERSION="${RAW_VERSION#v}"
          if ! printf '%s' "$RAW_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$'; then
            echo "Invalid version '$RAW_VERSION'. Use SemVer like 1.2.3 or 1.2.3-rc.1." >&2
            exit 1
          fi

          echo "version=v${RAW_VERSION}" >> "$GITHUB_OUTPUT"

          if printf '%s' "$RAW_VERSION" | grep -q -- '-'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
            echo "docker_channel_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "docker_channel_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract catalog versions
        id: catalog
        run: |
          # Extract versions from pnpm-workspace.yaml catalog
          extract_version() {
            grep "^  $1:" pnpm-workspace.yaml | sed 's/.*: //' | tr -d ' '
          }

          echo "prisma=$(extract_version prisma)" >> $GITHUB_OUTPUT

          echo "Extracted versions:"
          cat $GITHUB_OUTPUT

  # Build dev-server for each architecture natively
  build-dev-server:
    needs: prepare
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dev-server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dev-server
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: |
            PRISMA_VERSION=${{ needs.prepare.outputs.prisma_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/dev-server:${{ needs.prepare.outputs.version }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=dev-server-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=dev-server-${{ matrix.suffix }}

  # Create multi-arch manifest for dev-server
  manifest-dev-server:
    needs: [prepare, build-dev-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/dev-server"
          CHANNEL_TAG="${{ needs.prepare.outputs.docker_channel_tag }}"
          IS_PRERELEASE="${{ needs.prepare.outputs.is_prerelease }}"

          # Create manifest for versioned tag
          docker manifest create ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

          docker manifest push ${IMAGE}:${VERSION}

          # Create channel tag: latest for stable, next for previews
          docker manifest create ${IMAGE}:${CHANNEL_TAG} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

          docker manifest push ${IMAGE}:${CHANNEL_TAG}

          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Published preview Docker tags: ${VERSION}, ${CHANNEL_TAG}"
          else
            echo "Published stable Docker tags: ${VERSION}, ${CHANNEL_TAG}"
          fi

  publish-cli:
    needs: [prepare, manifest-dev-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          pnpm config set node-linker hoisted
          pnpm install --frozen-lockfile

      - name: Set CLI version
        working-directory: packages/cli
        run: |
          # Strip 'v' prefix for npm version
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION="${VERSION#v}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "CLI version already $VERSION; skipping npm version."
          else
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Publish CLI to npmjs
        working-directory: packages/cli
        run: npm publish --access public --tag "${{ needs.prepare.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    needs: [prepare, manifest-dev-server, publish-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.is_prerelease == 'true' && format('{0} (preview)', needs.prepare.outputs.version) || needs.prepare.outputs.version }}
          generate_release_notes: true
          draft: ${{ needs.prepare.outputs.is_prerelease == 'false' }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          body: |
            ## Docker Images

            ```bash
            docker pull ghcr.io/${{ env.IMAGE_PREFIX }}/dev-server:${{ needs.prepare.outputs.version }}
            ```

            Channel tag:

            ```bash
            docker pull ghcr.io/${{ env.IMAGE_PREFIX }}/dev-server:${{ needs.prepare.outputs.docker_channel_tag }}
            ```

            ## CLI

            Published to npmjs dist-tag `${{ needs.prepare.outputs.npm_tag }}`.

  sync-cli-version:
    needs: [prepare, create-release]
    if: ${{ needs.prepare.outputs.is_prerelease == 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync CLI version in package.json
        id: sync
        working-directory: packages/cli
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION="${VERSION#v}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "CLI package.json is already at $VERSION"
            exit 0
          fi

          npm version "$VERSION" --no-git-tag-version
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR for version sync
        if: ${{ steps.sync.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(cli): sync version to ${{ needs.prepare.outputs.version }}"
          title: "chore(cli): sync cli version to ${{ needs.prepare.outputs.version }}"
          body: "Sync `packages/cli/package.json` version to match release `${{ needs.prepare.outputs.version }}`."
          branch: "chore/sync-cli-version-${{ needs.prepare.outputs.version }}"
          base: ${{ github.event.repository.default_branch }}
          add-paths: |
            packages/cli/package.json
